name: Release

# Source lives in this (private) repo; the build is published to the PUBLIC
# KiyoshiTheDevil/Kodama-dist repo (updater manifest + news + installer downloads),
# so the auto-updater works while the source stays private (closed beta).

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The vendored Composer must be built BEFORE the Python server: PyInstaller bundles
      # composer/dist into the backend exe (see the .spec files + _composer_dist_dir).
      - name: Build vendored Composer
        working-directory: composer
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile
          pnpm build

      - name: Create build directories
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          New-Item -ItemType Directory -Force src-tauri/resources | Out-Null

      - name: Install Python dependencies
        working-directory: python-backend
        run: pip install -r requirements.txt pyinstaller

      # Inject the Discord feedback webhook from a repo secret so PyInstaller bundles it.
      - name: Configure feedback webhook
        working-directory: python-backend
        env:
          WEBHOOK: ${{ secrets.KODAMA_FEEDBACK_WEBHOOK }}
        run: |
          $cfg = @{ webhook = "$env:WEBHOOK" } | ConvertTo-Json -Compress
          Set-Content -Path feedback_config.json -Value $cfg -Encoding utf8

      - name: Build Python server (Windows)
        working-directory: python-backend
        run: |
          pyinstaller kodama-server-x86_64-pc-windows-msvc.spec `
            --distpath ../src-tauri/binaries `
            --workpath build_tmp/kodama-server-x86_64-pc-windows-msvc

      - name: Download node.exe
        run: |
          Invoke-WebRequest `
            -Uri "https://nodejs.org/dist/v20.11.0/win-x64/node.exe" `
            -OutFile "src-tauri/resources/node.exe"

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Build + sign only (no GitHub release here). createUpdaterArtifacts:true in
      # tauri.conf makes this produce the .nsis installer AND its .sig signature.
      - name: Build signed Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis

      # Publish installer + signature to the PUBLIC dist repo, then write its latest.json
      # (the auto-updater manifest). Needs DIST_REPO_TOKEN = a PAT with Contents:write on
      # KiyoshiTheDevil/Kodama-dist.
      - name: Publish to public dist repo
        shell: bash
        env:
          DIST_TOKEN: ${{ secrets.DIST_REPO_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DIST="KiyoshiTheDevil/Kodama-dist"
          PRE=""
          case "$TAG" in *alpha*|*beta*|*rc*) PRE="--prerelease";; esac

          BUNDLE="src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          EXE=$(ls "$BUNDLE"/*_x64-setup.exe | head -1)
          SIG="$EXE.sig"
          if [ ! -f "$EXE" ] || [ ! -f "$SIG" ]; then
            echo "::error::installer or signature not found"; ls -R "$BUNDLE" || true; exit 1
          fi
          EXE_NAME=$(basename "$EXE")

          export GH_TOKEN="$DIST_TOKEN"

          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \\[${VERSION}\\]/{f=1;next} f&&/^## \\[/{exit} f" CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -80)
          fi
          [ -n "$NOTES" ] || NOTES="Kodama $TAG"

          gh release view "$TAG" --repo "$DIST" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$DIST" --title "Kodama $TAG" --notes "$NOTES" $PRE
          gh release upload "$TAG" "$EXE" "$SIG" --repo "$DIST" --clobber

          URL="https://github.com/$DIST/releases/download/$TAG/$EXE_NAME"
          SIG_CONTENT=$(cat "$SIG")
          jq -n \
            --arg version "v${VERSION}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "$URL" \
            --arg sig "$SIG_CONTENT" \
            --arg notes "$NOTES" \
            '{version:$version, pub_date:$pub_date, notes:$notes, platforms:{"windows-x86_64":{url:$url, signature:$sig}}}' \
            > latest.json
          echo "latest.json:"; cat latest.json

          git clone --depth 1 "https://x-access-token:${DIST_TOKEN}@github.com/${DIST}.git" dist_repo
          mkdir -p dist_repo/updates
          cp latest.json dist_repo/updates/latest.json
          cd dist_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add updates/latest.json
          git diff --cached --quiet && echo "latest.json unchanged" || git commit -m "release: $TAG"
          git push

          echo "═══════════════════════════════════════════════════════"
          echo "  $TAG published to $DIST. Updater manifest updated."
          echo "═══════════════════════════════════════════════════════"
